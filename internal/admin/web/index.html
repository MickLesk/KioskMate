<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KioskMate Admin</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2328c783'/%3E%3Cpath d='M18 46V18h8v11l11-11h10L34 31l14 15H38L26 33v13z' fill='%2306120c'/%3E%3C/svg%3E" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d10;
        --panel: #12161b;
        --panel-2: #171d23;
        --panel-3: #1d252d;
        --field: #0e1318;
        --line: #29343f;
        --line-2: #3a4652;
        --text: #f3f7fa;
        --muted: #98a6b3;
        --soft: #c6d1da;
        --green: #28c783;
        --green-2: #174b35;
        --cyan: #38bdf8;
        --amber: #f1b84b;
        --red: #f87171;
        --blue: #7dd3fc;
        --shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
        --radius: 8px;
        --sidebar: 280px;
      }

      [data-theme="light"] {
        color-scheme: light;
        --bg: #f4f7f9;
        --panel: #ffffff;
        --panel-2: #f8fafc;
        --panel-3: #eef3f7;
        --field: #ffffff;
        --line: #d8e1e8;
        --line-2: #c8d3dc;
        --text: #14202a;
        --muted: #657481;
        --soft: #334451;
        --green: #148a5b;
        --green-2: #d9f4e9;
        --cyan: #0479ad;
        --amber: #9a6507;
        --red: #c73535;
        --blue: #026899;
        --shadow: 0 18px 42px rgba(15, 23, 42, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        letter-spacing: 0;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        min-height: 36px;
        border: 1px solid var(--line-2);
        border-radius: 7px;
        background: var(--panel-3);
        color: var(--text);
        padding: 8px 12px;
        cursor: pointer;
      }

      button:hover {
        border-color: var(--green);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.58;
      }

      button.primary {
        border-color: transparent;
        background: var(--green);
        color: #06120c;
        font-weight: 700;
      }

      button.danger {
        border-color: transparent;
        background: var(--red);
        color: #230505;
        font-weight: 700;
      }

      button.ghost {
        background: transparent;
      }

      input,
      select,
      textarea {
        width: 100%;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--field);
        color: var(--text);
        padding: 8px 10px;
      }

      textarea {
        min-height: 126px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 650;
      }

      a {
        color: var(--blue);
      }

      code,
      pre {
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      }

      pre {
        margin: 0;
        overflow: auto;
        white-space: pre-wrap;
      }

      .login {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }

      .login-card {
        width: min(460px, 100%);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .login-card .head,
      .card .head,
      .section-head {
        border-bottom: 1px solid var(--line);
        padding: 14px 16px;
      }

      .login-card .body,
      .card .body {
        padding: 16px;
      }

      .login-brand {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .mark {
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border-radius: 8px;
        background: var(--green-2);
        color: var(--green);
        font-weight: 900;
      }

      .layout {
        display: grid;
        min-height: 100vh;
        grid-template-columns: var(--sidebar) minmax(0, 1fr);
      }

      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        border-right: 1px solid var(--line);
        background: var(--panel);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
      }

      .brand {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 18px;
        border-bottom: 1px solid var(--line);
      }

      .brand h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.1;
      }

      .brand p,
      .muted,
      .hint {
        margin: 0;
        color: var(--muted);
      }

      .nav {
        padding: 12px;
        overflow: auto;
      }

      .nav button {
        display: flex;
        width: 100%;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 4px;
        border-color: transparent;
        background: transparent;
        color: var(--soft);
        text-align: left;
      }

      .nav button.active {
        background: var(--green-2);
        color: var(--text);
      }

      .nav small {
        color: var(--muted);
      }

      .nav-group {
        margin-bottom: 6px;
      }

      .nav-parent {
        font-weight: 760;
      }

      .nav-parent .chevron {
        color: var(--muted);
        font-size: 12px;
      }

      .nav-children {
        display: grid;
        gap: 2px;
        margin: 2px 0 8px 12px;
        padding-left: 10px;
        border-left: 1px solid var(--line);
      }

      .nav-children button {
        min-height: 34px;
        margin-bottom: 0;
        padding: 7px 9px;
        font-size: 13px;
      }

      .sidebar-foot {
        padding: 12px;
        border-top: 1px solid var(--line);
        display: grid;
        gap: 8px;
      }

      .main {
        min-width: 0;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        min-height: 66px;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--panel) 94%, transparent);
        padding: 12px 18px;
        backdrop-filter: blur(12px);
      }

      .title h2 {
        margin: 0;
        font-size: 20px;
      }

      .title p {
        margin: 3px 0 0;
        color: var(--muted);
      }

      .chips,
      .actions,
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .chip {
        display: inline-flex;
        min-height: 28px;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel-2);
        color: var(--soft);
        padding: 4px 9px;
        font-size: 12px;
      }

      .chip.ok {
        border-color: color-mix(in srgb, var(--green) 50%, var(--line));
        color: var(--green);
      }

      .chip.warn {
        border-color: color-mix(in srgb, var(--amber) 50%, var(--line));
        color: var(--amber);
      }

      .chip.bad {
        border-color: color-mix(in srgb, var(--red) 50%, var(--line));
        color: var(--red);
      }

      .notice {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel-2);
        color: var(--soft);
        padding: 10px 12px;
      }

      .notice.warn {
        border-color: color-mix(in srgb, var(--amber) 45%, var(--line));
        color: var(--amber);
      }

      .content {
        padding: 18px;
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      .grid.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid.three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .card.flat {
        box-shadow: none;
      }

      .card .head,
      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .card h3,
      .section-head h3 {
        margin: 0;
        font-size: 14px;
      }

      .metric {
        display: grid;
        gap: 4px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel-2);
        padding: 12px;
      }

      .metric strong {
        font-size: 20px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .form-grid.one {
        grid-template-columns: 1fr;
      }

      .span-2 {
        grid-column: span 2;
      }

      .switch {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel-2);
        padding: 9px 11px;
      }

      .switch input {
        width: 18px;
        min-height: 18px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 9px;
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 12px;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .table-wrap {
        overflow: auto;
      }

      .page-row,
      .rule-row,
      .rotation-row {
        display: grid;
        grid-template-columns: minmax(120px, 0.6fr) minmax(180px, 1.4fr) auto auto;
        gap: 8px;
        align-items: end;
        border-bottom: 1px solid var(--line);
        padding: 10px 0;
      }

      .rule-row {
        grid-template-columns: minmax(120px, 0.8fr) minmax(92px, 0.5fr) minmax(90px, 0.4fr) minmax(90px, 0.4fr) minmax(150px, 1fr) auto auto;
      }

      .rotation-row {
        grid-template-columns: minmax(120px, 1fr) minmax(110px, 0.5fr) auto;
      }

      .workflow-strip {
        display: grid;
        gap: 10px;
      }

      .workflow-line {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .workflow-step {
        min-width: 160px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel-2);
        padding: 10px;
      }

      .workflow-step strong {
        display: block;
        margin-bottom: 4px;
      }

      .kiosk-shell {
        display: grid;
        gap: 14px;
      }

      .kiosk-hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(300px, 0.45fr);
        gap: 14px;
      }

      .kiosk-status {
        display: grid;
        gap: 10px;
      }

      .status-url {
        overflow: hidden;
        color: var(--muted);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .primary-actions {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .primary-actions button {
        min-height: 42px;
      }

      .page-list {
        display: grid;
        gap: 10px;
      }

      .page-card {
        display: grid;
        grid-template-columns: minmax(180px, 0.5fr) minmax(260px, 1fr) auto;
        gap: 10px;
        align-items: end;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel-2);
        padding: 12px;
      }

      .page-card.active {
        border-color: color-mix(in srgb, var(--green) 55%, var(--line));
        box-shadow: inset 3px 0 0 var(--green);
      }

      .page-card-actions {
        display: grid;
        gap: 8px;
        min-width: 170px;
      }

      .page-card-actions .switch {
        min-height: 36px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
      }

      .toolbar input {
        max-width: 360px;
      }

      .page-card-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }

      .page-card-actions button {
        width: 100%;
      }

      .check-panel {
        display: grid;
        gap: 8px;
        max-height: 220px;
        overflow: auto;
      }

      .check-row {
        display: grid;
        grid-template-columns: minmax(160px, 0.5fr) minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel-2);
        padding: 8px;
      }

      .status-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .workflow-board {
        display: grid;
        grid-template-columns: minmax(260px, 0.36fr) minmax(0, 1fr);
        gap: 14px;
      }

      .workflow-settings {
        display: grid;
        gap: 10px;
        align-content: start;
      }

      .workflow-lanes {
        display: grid;
        gap: 14px;
      }

      .lane {
        display: grid;
        gap: 10px;
      }

      .lane-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .workflow-step {
        position: relative;
      }

      .workflow-step::after {
        content: "";
        position: absolute;
        top: 50%;
        right: -9px;
        width: 9px;
        border-top: 1px solid var(--line-2);
      }

      .workflow-step:last-child::after {
        display: none;
      }

      .empty {
        border: 1px dashed var(--line-2);
        border-radius: var(--radius);
        color: var(--muted);
        padding: 18px;
        text-align: center;
      }

      .terminal,
      .logbox,
      .jsonbox {
        min-height: 220px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #050709;
        color: #c7f9d4;
        padding: 12px;
        font-size: 12px;
      }

      [data-theme="light"] .terminal,
      [data-theme="light"] .logbox,
      [data-theme="light"] .jsonbox {
        background: #0f1720;
        color: #d8fbe2;
      }

      .preview {
        width: 100%;
        height: min(56vh, 560px);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--field);
      }

      .toasts {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 50;
        display: grid;
        gap: 8px;
        width: min(420px, calc(100vw - 32px));
      }

      .toast {
        border: 1px solid var(--line);
        border-left: 4px solid var(--green);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
        padding: 11px 12px;
      }

      .toast.error {
        border-left-color: var(--red);
      }

      .toast.warn {
        border-left-color: var(--amber);
      }

      .toast strong {
        display: block;
        margin-bottom: 3px;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 80;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(0, 0, 0, 0.58);
      }

      .modal {
        width: min(860px, 100%);
        max-height: min(760px, calc(100vh - 36px));
        display: grid;
        grid-template-rows: auto 1fr auto;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .modal-head,
      .modal-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }

      .modal-foot {
        border-top: 1px solid var(--line);
        border-bottom: 0;
      }

      .modal-body {
        min-height: 0;
        overflow: auto;
        padding: 16px;
      }

      .live-log {
        display: grid;
        gap: 8px;
      }

      .live-line {
        display: grid;
        grid-template-columns: 86px 150px 1fr;
        gap: 10px;
        align-items: start;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel-2);
        padding: 10px;
      }

      .live-line .status {
        width: max-content;
        min-width: 72px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 2px 8px;
        text-align: center;
        font-size: 12px;
        font-weight: 750;
      }

      .live-line.ok .status {
        border-color: rgba(40, 199, 131, 0.65);
        color: var(--green);
      }

      .live-line.error .status {
        border-color: rgba(248, 113, 113, 0.65);
        color: var(--red);
      }

      .live-line.running .status {
        border-color: rgba(241, 184, 75, 0.65);
        color: var(--amber);
      }

      .live-line code {
        display: block;
        margin-top: 5px;
        color: var(--soft);
        word-break: break-all;
      }

      .busy {
        pointer-events: none;
        opacity: 0.72;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 1040px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: relative;
          height: auto;
        }

        .nav {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .grid.two,
        .grid.three,
        .form-grid {
          grid-template-columns: 1fr;
        }

        .span-2 {
          grid-column: auto;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .page-row,
        .rule-row,
        .rotation-row,
        .live-line,
        .kiosk-hero,
        .page-card,
        .workflow-board {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 560px) {
        .content,
        .topbar {
          padding: 12px;
        }

        .nav {
          grid-template-columns: 1fr;
        }

        .chips,
        .actions,
        .row {
          align-items: stretch;
          flex-direction: column;
        }

        .actions button,
        .row button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="toasts" class="toasts"></div>
    <div id="modal-root"></div>

      function t(key) {
        return (I18N[state.lang] && I18N[state.lang][key]) || I18N.en[key] || key;

      function esc(value) {
        return String(value ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
      }

      function val(id) {
        return document.getElementById(id)?.value ?? "";
      }

      function checked(id) {
        return !!document.getElementById(id)?.checked;
      }

      function setBusy(name, on) {
        if (on) state.busy.add(name);
        else state.busy.delete(name);
        document.querySelectorAll(`[data-busy="${CSS.escape(name)}"]`).forEach((el) => {
          el.disabled = on;
          el.classList.toggle("busy", on);
        });
      }

      function toast(title, message = "", type = "ok") {
        const item = document.createElement("div");
        item.className = "toast " + (type === "error" ? "error" : type === "warn" ? "warn" : "");
        item.innerHTML = `<strong>${esc(title)}</strong>${message ? `<div class="muted">${esc(message)}</div>` : ""}`;
        toasts.appendChild(item);
        setTimeout(() => item.remove(), 5200);
      }

      function openModal(html) {
        modalRoot.innerHTML = `<div class="modal-backdrop" data-modal-backdrop>${html}</div>`;
        modalRoot.querySelectorAll("[data-modal-close]").forEach((button) => button.addEventListener("click", closeModal));
        modalRoot.querySelector("[data-modal-backdrop]")?.addEventListener("click", (event) => {
          if (event.target?.dataset?.modalBackdrop !== undefined) closeModal();
        });

      function closeModal() {

      function appendMQTTEvent(event) {
        const log = document.getElementById("mqtt-live-log");
        const summary = document.getElementById("mqtt-live-summary");
        if (!log) return;
        const status = event.status || "running";
        const topic = event.topic || "";
        const topics = Array.isArray(event.published_topics) ? event.published_topics.join("\n") : "";
        const result = event.result ? JSON.stringify(event.result, null, 2) : "";
        const detail = topic || topics || result;
        const line = document.createElement("div");
        line.className = `live-line ${esc(status)}`;
        line.innerHTML = `
          <div class="status">${esc(status)}</div>
          <div><strong>${esc(event.step || "-")}</strong><div class="hint">${esc(event.elapsed_ms ?? 0)} ms</div></div>
          <div>${esc(event.message || "")}${detail ? `<code>${esc(detail)}</code>` : ""}</div>`;
        log.appendChild(line);
        line.scrollIntoView({ block: "end" });
        if (summary) summary.textContent = event.message || "";
      }

      async function streamJSONLines(path, body, onEvent, signal) {
        const response = await fetch(path, {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
          signal,
        });
        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || response.statusText || "HTTP " + response.status);
        }
        if (!response.body) throw new Error("Streaming response is not available");
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        for (;;) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop() || "";
          for (const line of lines) {
            if (!line.trim()) continue;
            onEvent(JSON.parse(line));
          }
        }
        buffer += decoder.decode();
        if (buffer.trim()) onEvent(JSON.parse(buffer));
      }

      function formatValue(value, suffix = "") {
        if (value === null || value === undefined || value === "") return "-";
        if (typeof value === "number") {
          const rounded = Math.abs(value) >= 100 ? Math.round(value) : Math.round(value * 10) / 10;
          return String(rounded) + suffix;
        }
        if (typeof value === "boolean") return value ? t("yes") : t("no");
        if (Array.isArray(value)) return value.join(", ");
        if (typeof value === "object") return JSON.stringify(value);
        return String(value);
      }

      function formatDate(value) {
        if (!value) return t("never");
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? String(value) : date.toLocaleString();
      }

      function secondsToDuration(value, fallback = 0) {
        const n = Number(value);
        if (!Number.isFinite(n) || n <= 0) return fallback;
        return Math.round(n / 1_000_000_000);
      }

      function formatDuration(seconds) {
        const total = Number(seconds || 0);
        if (total >= 3600 && total % 3600 === 0) return `${total / 3600} h`;
        if (total >= 60 && total % 60 === 0) return `${total / 60} min`;
        return `${total} s`;
      }

      function durationToNs(seconds) {
        return Math.max(0, Number(seconds || 0)) * 1_000_000_000;
      }

      function cloneConfig() {
        return JSON.parse(JSON.stringify(state.config || {}));
      }

      async function request(path, options = {}) {
        const response = await fetch(path, {
          credentials: "same-origin",
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
          ...options,
        });
        const text = await response.text();
        let data = {};
        if (text) {
          try {
            data = JSON.parse(text);
          } catch {
            data = { error: text };
          }
        }
        if (!response.ok) throw new Error(data.error || response.statusText || "HTTP " + response.status);
        return data;
      }

      const getJSON = (path) => request(path);
      const postJSON = (path, body = {}) => request(path, { method: "POST", body: JSON.stringify(body) });
      const deleteJSON = (path) => request(path, { method: "DELETE" });

      async function runAction(name, fn, success = t("actionDone")) {
        setBusy(name, true);
        recordAction(t("actionStarted"), name, "warn");
        try {
          const result = await fn();
          toast(success, "", "ok");
          recordAction(success, name, "ok");
          return result;
        } catch (err) {
          toast(t("failed"), err.message, "error");
          recordAction(t("failed"), `${name}: ${err.message}`, "error");
          throw err;
        } finally {
          setBusy(name, false);
        }
      }

      function recordAction(title, detail = "", type = "ok") {
        state.actionLog.unshift({ title, detail, type, at: new Date().toISOString() });
        state.actionLog = state.actionLog.slice(0, 8);
      }

      async function boot() {
        try {
          state.auth = await getJSON("/api/auth/status");
          if (!state.auth.authenticated) {
            renderLogin();
            return;
          }
          await refreshCore();
          renderApp();
        } catch (err) {
          root.innerHTML = `<div class="login"><div class="login-card"><div class="body"><h2>${esc(t("failed"))}</h2><p class="muted">${esc(err.message)}</p></div></div></div>`;
        }
      }

      async function refreshCore() {
        const [cfg, status, hardware, privilege] = await Promise.all([
          getJSON("/api/config"),
          getJSON("/api/status"),
          getJSON("/api/hardware"),
          getJSON("/api/privilege"),
        ]);
        state.config = cfg;
        state.status = status;
        state.hardware = hardware;
        state.privilege = privilege;
      }

      async function refreshAndRender() {
        await runAction("refresh", async () => {
          await refreshCore();
          renderApp();
        }, t("refresh"));
      }

      function renderNav() {
        return NAV.map((item) => {
          const children = item.children || [];
          const active = isNavActive(item);
          const target = children[0]?.id || item.id;
          const childHtml = active && children.length
            ? `<div class="nav-children">${children.map((child) => `<button class="${state.view === child.id ? "active" : ""}" data-view="${child.id}"><span>${esc(t(child.label))}</span><small>${esc(t(child.hint))}</small></button>`).join("")}</div>`
            : "";
          return `
            <div class="nav-group">
              <button class="nav-parent ${active ? "active" : ""}" data-view="${target}">
                <span>${esc(t(item.label))}</span>
                ${children.length ? `<span class="chevron">${active ? "▾" : "▸"}</span>` : `<small>${esc(t(item.hint))}</small>`}
              </button>
              ${childHtml}
            </div>`;
        }).join("");
      }

      function isNavActive(item) {
        return state.view === item.id || (item.children || []).some((child) => child.id === state.view);
      }

      function activeNavItem() {
        for (const item of NAV) {
          if (state.view === item.id) return item;
          const child = (item.children || []).find((entry) => entry.id === state.view);
          if (child) return child;
        }
        return NAV[0];
      }

        switch (state.view) {
          case "kiosk":
            return renderKiosk();
          case "mqtt":
            return renderMQTT();
          case "system":
          case "system-actions":
            return renderSystemActions();
          case "system-hardware":
            return renderHardware();
          case "system-terminal":
            return renderTerminal();
          case "system-logs":
            return renderLogs();
          case "settings":
          case "settings-admin":
            return renderSettingsAdmin();
          case "settings-browser":
            return renderSettingsBrowser();
          case "settings-config":
            return renderSettingsConfig();
          case "settings-maintenance":

          default:

            renderApp();

      function syncKioskURLs(kiosk) {
        kiosk.urls = (kiosk.pages || []).filter((p) => !p.disabled && p.url).map((p) => p.url);
      }

      function movePage(kiosk, index, direction) {
        const pages = kiosk.pages || [];
        const next = index + direction;
        if (index < 0 || next < 0 || index >= pages.length || next >= pages.length) return;
        const order = pages.map((_, i) => i);
        [order[index], order[next]] = [order[next], order[index]];
        kiosk.pages = order.map((oldIndex) => pages[oldIndex]);
        remapPageIndexes(kiosk, order);
        syncKioskURLs(kiosk);
      }

      function removePage(kiosk, index) {
        const pages = kiosk.pages || [];
        const order = pages.map((_, i) => i).filter((oldIndex) => oldIndex !== index);
        kiosk.pages = order.map((oldIndex) => pages[oldIndex]);
        remapPageIndexes(kiosk, order);
        syncKioskURLs(kiosk);
      }

      function remapPageIndexes(kiosk, order) {
        const map = new Map(order.map((oldIndex, newIndex) => [oldIndex, newIndex]));
        const remap = (page) => map.has(Number(page)) ? map.get(Number(page)) : 0;
        kiosk.rotation = (kiosk.rotation || []).map((item) => ({ ...item, page: remap(item.page) }));
        kiosk.time_rules = (kiosk.time_rules || []).map((rule) => ({ ...rule, page: remap(rule.page) }));
      }

      async function testMQTT() {
        const output = document.getElementById("mqtt-result");
        await runAction("mqtt-test", async () => {
          openMQTTTestDialog();
          const payload = {
            url: val("mqtt-url"),
            version: val("mqtt-version"),
            username: val("mqtt-user"),
            password: val("mqtt-password"),
            discovery: val("mqtt-discovery") || "homeassistant",
            base_topic: val("mqtt-base-topic") || "kioskmate",
            node: val("mqtt-node"),
            client_id: val("mqtt-client-id"),
            keepalive_seconds: Number(val("mqtt-keepalive") || 60),
            force_disable_retain: checked("mqtt-disable-retain"),
          };
          if (output) output.textContent = `${t("loading")}...`;
          const controller = new AbortController();
          const timer = setTimeout(() => controller.abort(), 35_000);
          let result = null;
          try {
            await streamJSONLines("/api/mqtt/test/live", payload, (event) => {
              appendMQTTEvent(event);
              if (event.result) result = event.result;
              if (event.step === "result" && event.result) result = event.result;
            }, controller.signal);
            if (!result) throw new Error("MQTT test did not return a result");
          } catch (err) {
            const message = err.name === "AbortError" ? "Timeout after 35s" : err.message;
            appendMQTTEvent({
              step: "client",
              status: "error",
              message,
              elapsed_ms: 0,
            });
            if (output) output.textContent = `${t("disconnected")}: ${message}`;
            throw err;
          } finally {
            clearTimeout(timer);
          }
          const topics = (result.published_topics || []).join("\n");
          if (output) output.textContent = result.ok
            ? `${t("connected")} (${result.latency_ms} ms)\n${t("publishedTopics")}:\n${topics}`
            : `${t("disconnected")}: ${result.error || t("unknown")}`;
        }, t("testConnection"));
      }

      async function pollJob(id) {
        for (let i = 0; i < 80; i++) {
          await new Promise((resolve) => setTimeout(resolve, 1000));
          try {
            const job = await getJSON("/api/jobs/" + encodeURIComponent(id));
            const index = state.jobs.findIndex((item) => item.id === id);
            if (index >= 0) state.jobs[index] = job;
            if (state.view === "system" || state.view === "system-actions") {
              const output = document.getElementById("job-output");
              if (output) output.textContent = renderJobs();
            }
            if (job.finished) return;
          } catch {
            return;
          }
        }
      }

      function collectPages() {
        const existing = normalizePages(state.config?.kiosk?.pages, state.config?.kiosk?.urls);
        return existing.map((_, index) => ({
          name: val(`page-name-${index}`),
          url: val(`page-url-${index}`),
          disabled: checked(`page-disabled-${index}`),
        })).filter((page) => page.name || page.url);
      }

      function collectRotation() {
        const items = state.config?.kiosk?.rotation || [];
        return items.map((_, index) => ({ page: Number(val(`rotation-page-${index}`) || 0), duration_seconds: Number(val(`rotation-duration-${index}`) || 3600) }));
      }

      function collectRules() {
        const items = state.config?.kiosk?.time_rules || [];
        return items.map((_, index) => ({
          name: val(`rule-name-${index}`),
          page: Number(val(`rule-page-${index}`) || 0),
          start: val(`rule-start-${index}`),
          end: val(`rule-end-${index}`),
          days: val(`rule-days-${index}`).split(",").map((s) => s.trim()).filter(Boolean),
          disabled: checked(`rule-disabled-${index}`),
        }));
      }

      function normalizePages(pages, urls) {
        if (Array.isArray(pages) && pages.length) return pages.map((p, i) => ({ name: p.name || `Page ${i + 1}`, url: p.url || "", disabled: !!p.disabled }));
        return (urls || []).map((url, i) => ({ name: `Page ${i + 1}`, url, disabled: false }));
      }

      function lines(id) {
        return val(id).split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
      }

      function commandTopic() {
        const base = String(val("mqtt-base-topic") || state.config?.mqtt?.base_topic || "kioskmate").replace(/^\/+|\/+$/g, "");
        const node = String(val("mqtt-node") || state.config?.mqtt?.node || "kioskmate").replace(/^\/+|\/+$/g, "");
        return `${base}/${node}/command`;
      }

      function browserPresetOptions() {
        return [
          ["chromium", t("chromium")],
          ["chromium-lite", t("chromiumLite")],
          ["firefox", t("firefox")],
          ["webkit-cog", t("webkitCog")],
          ["epiphany", t("epiphany")],
          ["midori", t("midori")],
          ["custom", t("custom")],
        ];
      }

      function objectEntries(obj) {
        return Object.entries(obj || {}).map(([key, value]) => [key.replaceAll("_", " "), formatValue(value)]);
      }

      function metric(title, value, hint = "") {
        return `<div class="metric"><span class="muted">${esc(title)}</span><strong>${esc(value)}</strong><span class="hint">${esc(hint)}</span></div>`;
      }

      function kvTable(rows) {
        return table(["", ""], rows.map(([a, b]) => [a, formatValue(b)]));
      }

      function table(headers, rows, raw = false) {
        return `<div class="table-wrap"><table><thead><tr>${headers.map((h) => `<th>${esc(h)}</th>`).join("")}</tr></thead><tbody>${rows
          .map((row) => `<tr>${row.map((cell) => `<td>${raw ? cell : esc(cell)}</td>`).join("")}</tr>`)
          .join("")}</tbody></table></div>`;
      }

      function field(id, label, type = "text", autocomplete = "", value = "") {
        return `<div><label for="${esc(id)}">${esc(label)}</label><input id="${esc(id)}" type="${esc(type)}" ${autocomplete ? `autocomplete="${esc(autocomplete)}"` : ""} value="${esc(value)}" /></div>`;
      }

      function textarea(id, label, value = "") {
        return `<div><label for="${esc(id)}">${esc(label)}</label><textarea id="${esc(id)}">${esc(value)}</textarea></div>`;
      }

      function selectHtml(id, label, value, options) {
        return `<div><label for="${esc(id)}">${esc(label)}</label><select id="${esc(id)}">${(options || [])
          .map(([v, text]) => `<option value="${esc(v)}" ${String(v) === String(value) ? "selected" : ""}>${esc(text)}</option>`)
          .join("")}</select></div>`;
      }

      function switchHtml(id, label, on) {
        return `<label class="switch" for="${esc(id)}"><span>${esc(label)}</span><input id="${esc(id)}" type="checkbox" ${on ? "checked" : ""} /></label>`;
      }

      function button(labelKey, action, cls = "") {
        return `<button class="${esc(cls)}" data-busy="${esc(action)}" data-action="${esc(action)}">${esc(t(labelKey))}</button>`;
      }

      boot();
    </script>
  </body>
</html>
