name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
          cache-dependency-path: go.sum
      - name: Verify formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Race tests
        run: go test -race ./...
      - name: Frontend syntax
        run: |
          node --check internal/admin/web/assets/theme.js
          node --check internal/admin/web/assets/i18n.js
          node --check internal/admin/web/assets/app.js
          node scripts/check-i18n.mjs
      - name: Build Linux binaries
        run: |
          GOOS=linux GOARCH=arm64 go build -trimpath -o /tmp/kioskmate-linux-arm64 ./cmd/kioskmate
          GOOS=linux GOARCH=amd64 go build -trimpath -o /tmp/kioskmate-linux-amd64 ./cmd/kioskmate
      - name: Build Debian packages
        run: |
          VERSION=0.0.0-ci ARCH=arm64 bash scripts/package-deb.sh
          VERSION=0.0.0-ci ARCH=amd64 bash scripts/package-deb.sh
