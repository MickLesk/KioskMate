name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
          cache-dependency-path: go.mod

      - name: Show Go version
        run: go version

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: go test ./...

      - name: Build linux arm64
        run: GOOS=linux GOARCH=arm64 go build -trimpath -o /tmp/kioskmate-linux-arm64 ./cmd/kioskmate

      - name: Build linux amd64
        run: GOOS=linux GOARCH=amd64 go build -trimpath -o /tmp/kioskmate-linux-amd64 ./cmd/kioskmate

      - name: Build deb arm64
        run: VERSION=0.0.0-ci ARCH=arm64 bash scripts/package-deb.sh

      - name: Build deb amd64
        run: VERSION=0.0.0-ci ARCH=amd64 bash scripts/package-deb.sh
