name: KioskMate CI

on:
  push:
    branches:
      - dev/v2-supervisor
    paths:
      - "v2/**"
      - ".github/workflows/v2-ci.yml"
  pull_request:
    paths:
      - "v2/**"
      - ".github/workflows/v2-ci.yml"

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: v2/.go-version
          cache-dependency-path: v2/go.mod

      - name: Show Go version
        run: go version

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: go test ./...

      - name: Build linux arm64
        run: GOOS=linux GOARCH=arm64 go build -o /tmp/kioskmate-linux-arm64 ./cmd/kioskmate

      - name: Build linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o /tmp/kioskmate-linux-amd64 ./cmd/kioskmate

      - name: Build deb arm64
        run: VERSION=0.0.0-ci ARCH=arm64 bash scripts/package-deb.sh

      - name: Build deb amd64
        run: VERSION=0.0.0-ci ARCH=amd64 bash scripts/package-deb.sh
