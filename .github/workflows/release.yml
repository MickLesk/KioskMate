name: Release

on:
  push:
    tags:
      - "v0*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
          cache-dependency-path: go.sum

      - name: Verify release
        run: |
          test -z "$(gofmt -l .)"
          go vet ./...
          go test ./...

      - name: Build deb packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH=arm64 VERSION="$VERSION" bash scripts/package-deb.sh
          ARCH=amd64 VERSION="$VERSION" bash scripts/package-deb.sh
          (cd dist && sha256sum *.deb > SHA256SUMS)

      - name: Prepare release notes
        run: |
          awk -v version="$GITHUB_REF_NAME" '
            $0 == "## " version { found=1 }
            found && /^## / && $0 != "## " version { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          test -s /tmp/release-notes.md

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE=""
          case "$GITHUB_REF_NAME" in
            *alpha*|*beta*|*rc*) PRERELEASE="--prerelease" ;;
          esac
          gh release create "$GITHUB_REF_NAME" \
            --title "KioskMate ${GITHUB_REF_NAME#v}" \
            --notes-file /tmp/release-notes.md \
            $PRERELEASE \
            dist/*.deb dist/SHA256SUMS
